name: Android CI

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

env:
  APPVAULT_REPO: "abster07/app-vault"
  APP_ID: "Share Manage"
  APK_NAME: "share-manage.apk"

jobs:
  build:
    if: contains(github.event.head_commit.message, 'buildapp')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK to universal name
        run: mv app/build/outputs/apk/release/app-release.apk stream-vault.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.APK_NAME }}

  release:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      download_url: ${{ steps.url.outputs.download_url }}

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: .

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "share-manage-v1-${{ github.run_number }}"
          name: "Share Manage v1 Build #${{ github.run_number }}"
          body: "Automated Share Manage release (v1.0) from commit ${{ github.sha }}"
          files: ${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  appvault:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout source repo (for app-manifest.json)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout AppVault repo
        uses: actions/checkout@v4
        with:
          repository: abster07/app-vault
          token: ${{ secrets.GITHUB_TOKEN }}
          path: appvault
          persist-credentials: false

      - name: Fetch repo stats
        id: stats
        run: |
          REPO="${{ github.repository }}"

          DATA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${REPO})

          STARS=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")

          RELEASES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${REPO}/releases)

          DOWNLOADS=$(echo "$RELEASES" | python3 -c "
          import sys,json
          releases=json.load(sys.stdin)
          total=sum(
              a.get('download_count',0)
              for r in releases
              for a in r.get('assets',[])
              if a.get('name','').endswith('.apk')
          )
          print(total)
          ")

          echo "stars=$STARS" >> $GITHUB_OUTPUT
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT

      - name: Use existing icon
        run: |
          cp source/app/src/main/res/ic_launcher-web.png appvault/icons/${{ env.APP_ID }}.png

      - name: Update apps.json
        run: |
          cd appvault

          python3 << 'PYEOF'
          import json, os, datetime

          JSON_PATH = "apps.json"
          MANIFEST_PATH = "../source/app-manifest.json"

          try:
              with open(JSON_PATH) as f:
                  apps = json.load(f)
          except Exception:
              apps = []

          try:
              with open(MANIFEST_PATH) as f:
                  manifest = json.load(f)
          except Exception:
              manifest = {}

          app_id     = os.environ["APP_ID"]
          apk_name   = os.environ["APK_NAME"]
          stars      = int(os.environ["STARS"])
          downloads  = int(os.environ["DOWNLOADS"])
          sha        = os.environ["GITHUB_SHA"][:7]
          repo       = os.environ["GITHUB_REPOSITORY"]
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          today      = datetime.date.today().isoformat()

          download_url = (
              f"https://github.com/{repo}/releases/download/"
              f"stream-vault-v1-{run_number}/{apk_name}"
          )

          entry = {
              "id":          app_id,
              "name":        manifest.get("name", "Share Manage"),
              "version":     manifest.get("version", "1.0"),
              "description": manifest.get("description"),
              "iconUrl":     f"icons/{app_id}.png",
              "iconBg":      manifest.get("iconBg", ""),
              "tags":        manifest.get("tags", []),
              "platforms":   manifest.get("platforms", ["android", "android-tv"]),
              "downloadUrl": download_url,
              "downloads":   downloads,
              "stars":       stars,
              "updated":     today,
              "commit":      sha
          }

          existing = next((a for a in apps if a["id"] == app_id), None)
          if existing:
              existing.update(entry)
          else:
              apps.append(entry)

          with open(JSON_PATH, "w") as f:
              json.dump(apps, f, indent=2)

          print(f"Updated apps.json → {download_url}")
          PYEOF
        env:
          APP_ID: ${{ env.APP_ID }}
          APK_NAME: ${{ env.APK_NAME }}
          STARS: ${{ steps.stats.outputs.stars }}
          DOWNLOADS: ${{ steps.stats.outputs.downloads }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Publish to AppVault
        run: |
          cd appvault
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json icons/
          git commit -m "chore(stream-vault): update from ${{ github.repository }}@${{ github.sha }}" || exit 0
          git push https://$PAT_TOKEN@github.com/abster07/app-vault.git
        env:
          PAT_TOKEN: ${{ secrets.PAT_CLASSIC }}